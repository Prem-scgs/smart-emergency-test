services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: smart-emergency-api
    restart: unless-stopped
    environment:
      # API ต้องเปิดที่ 4000 เพราะ Vercel rewrite, Cloudflare tunnel และ health check อ้าง port นี้
      PORT: 4000
      DATABASE_URL: postgres://emergency:emergency_dev@db:5432/smart_emergency
      CORS_ORIGINS: https://smart-emergency-test.vercel.app,http://localhost:3000,http://127.0.0.1:3000,http://web:3000
      # JWT secret is required even for local Docker because every admin API now verifies a signed token.
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in the shell or root .env before starting the API}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      ADMIN_BOOTSTRAP_NAME: ${ADMIN_BOOTSTRAP_NAME:-}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        EMERGENCY_API_INTERNAL_URL: http://api:4000
    container_name: smart-emergency-web
    restart: unless-stopped
    environment:
      EMERGENCY_API_INTERNAL_URL: http://api:4000
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: smart-emergency-cloudflared
    restart: unless-stopped
    # Quick tunnel นี้ URL จะเปลี่ยนเมื่อ container restart; production/demo domain ควรใช้ Named Tunnel
    command: tunnel --protocol http2 --url http://api:4000
    depends_on:
      api:
        condition: service_healthy
