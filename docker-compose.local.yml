services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: smart-emergency-api
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgres://emergency:emergency_dev@db:5432/smart_emergency
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://web:3000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        EMERGENCY_API_INTERNAL_URL: http://api:4000
    container_name: smart-emergency-web
    restart: unless-stopped
    environment:
      EMERGENCY_API_INTERNAL_URL: http://api:4000
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
